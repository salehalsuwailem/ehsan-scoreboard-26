name: مزامنة النتائج من Google Sheets

# تحديث تلقائي: يجلب أحدث بيانات Google Sheets، ويولّد data.json،
# ويدفع أي تغيير — فيُعيد Vercel النشر تلقائياً.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sheets-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: تثبيت الحزم
        run: npm install --no-audit --no-fund

      - name: توليد data.json من Google Sheets
        env:
          SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}
        run: |
          echo "API URL:"
          echo "$SHEETS_API_URL"
          npm run sync

