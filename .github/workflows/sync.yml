name: مزامنة النتائج من Google Sheets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sheets-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: تثبيت الحزم
        run: npm install --no-audit --no-fund

      - name: توليد data.json من Google Sheets
        env:
          SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}
        run: |
          echo "API URL:"
          echo "$SHEETS_API_URL"
          npm run sync

      - name: حفظ ودفع التغييرات (إن وجدت)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain src/data/data.json data/history.json)" ]; then
            git add src/data/data.json data/history.json
            git commit -m "تحديث النتائج تلقائياً من Google Sheets"

            git pull --rebase origin main || true

           git push origin HEAD:main || (
            git pull --rebase origin main &&
              git push origin HEAD:main
                 )

            echo "تم دفع تحديث جديد."
          else
            echo "لا توجد تغييرات."
          fi
